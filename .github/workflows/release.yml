name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # pre-create the release so electron-builder only uploads assets —
      # letting it create the release itself can race and produce duplicates
      - name: Create GitHub release (if missing)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: gh release create "${{ github.ref_name }}" --title "WhisperPress ${{ github.ref_name }}" --generate-notes || echo "release exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish to GitHub Releases
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
