<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'; media-src blob:" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body { background: transparent; overflow: hidden; height: 100%; }
  body { display: flex; align-items: flex-end; justify-content: center; font-family: "Segoe UI", "Microsoft JhengHei UI", sans-serif; }
  #pill {
    display: none; align-items: center; gap: 12px;
    min-width: 270px; max-width: 372px; height: 64px; margin-bottom: 14px; padding: 0 18px;
    background: rgba(22, 20, 32, 0.92); border: 1px solid rgba(139, 92, 246, 0.45);
    border-radius: 32px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
    color: #e8e6f0; cursor: pointer; backdrop-filter: blur(6px);
  }
  #pill.visible { display: flex; }
  #dot { width: 12px; height: 12px; border-radius: 50%; background: #ef4444; flex: none; animation: pulse 1.2s ease-in-out infinite; }
  #pill.locked #dot { background: #f59e0b; animation: pulse 0.7s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.8); } }
  #bars { width: 96px; height: 34px; flex: none; }
  #timer { font-size: 15px; font-variant-numeric: tabular-nums; color: #fff; flex: none; min-width: 42px; }
  #hint { font-size: 11.5px; color: #9b96ad; line-height: 1.3; flex: 1; overflow: hidden; }
  #spin { width: 18px; height: 18px; border: 2.5px solid rgba(139,92,246,.3); border-top-color: #a78bfa; border-radius: 50%; animation: rot .8s linear infinite; flex: none; display: none; }
  @keyframes rot { to { transform: rotate(360deg); } }
  #icon { font-size: 17px; flex: none; display: none; }
  #msg { font-size: 13px; color: #d6d2e3; flex: 1; display: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #cancel { flex: none; width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(255,255,255,.09); color: #b9b3cc; font-size: 13px; cursor: pointer; line-height: 1; }
  #cancel:hover { background: rgba(255,255,255,.2); color: #fff; }
  #pill.state-transcribing, #pill.state-done, #pill.state-error, #pill.state-empty { cursor: default; }
  #pill.state-transcribing #dot, #pill.state-done #dot, #pill.state-error #dot, #pill.state-empty #dot,
  #pill.state-transcribing #bars, #pill.state-done #bars, #pill.state-error #bars, #pill.state-empty #bars,
  #pill.state-transcribing #timer, #pill.state-done #timer, #pill.state-error #timer, #pill.state-empty #timer,
  #pill.state-transcribing #hint, #pill.state-done #hint, #pill.state-error #hint, #pill.state-empty #hint,
  #pill.state-transcribing #cancel, #pill.state-done #cancel, #pill.state-error #cancel, #pill.state-empty #cancel { display: none; }
  #pill.state-transcribing #spin { display: block; }
  #pill.state-transcribing #msg, #pill.state-done #msg, #pill.state-error #msg, #pill.state-empty #msg { display: block; }
  #pill.state-done #icon, #pill.state-error #icon, #pill.state-empty #icon { display: block; }
</style>
</head>
<body>
  <div id="pill">
    <div id="dot"></div>
    <canvas id="bars" width="192" height="68"></canvas>
    <div id="timer">0:00</div>
    <div id="hint"></div>
    <div id="spin"></div>
    <div id="icon"></div>
    <div id="msg"></div>
    <button id="cancel" title="Esc">✕</button>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
